name: Native WebRTC Stream

on: 
  workflow_dispatch:

jobs:
  native-stream:
    runs-on: macos-latest
    
    env:
      PKG_CONFIG_PATH: "/opt/homebrew/lib/pkgconfig"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          brew install ffmpeg pkg-config opus libvpx
          # Removed displayplacer (not supported on M2 Runner VMs)

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: |
          pip install --upgrade pip
          pip install aiortc aiohttp websockets pynput numpy pyobjc-framework-Quartz
          pip install av --no-binary av

      - name: Create Native Host Script
        run: |
          cat << 'EOF' > host.py
          import asyncio
          import json
          import ssl
          import websockets
          import subprocess
          import re
          from aiortc import RTCPeerConnection, RTCSessionDescription, RTCConfiguration, RTCIceServer
          from aiortc.contrib.media import MediaPlayer
          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Controller as KeyboardController
          import Quartz

          WS_URL = "wss://alvin3y1-forward.hf.space/macos"
          ICE_SERVERS = [
              RTCIceServer(
                  urls=["turns:turn.cloudflare.com:443?transport=tcp", "turn:turn.cloudflare.com:3478?transport=udp"],
                  username="g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6",
                  credential="aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d"
              )
          ]

          mouse = MouseController()
          keyboard = KeyboardController()

          def get_screen_size():
              main_display_id = Quartz.CGMainDisplayID()
              w = Quartz.CGDisplayPixelsWide(main_display_id)
              h = Quartz.CGDisplayPixelsHigh(main_display_id)
              return w, h

          # Helper to find the actual Screen device index (avoids Camera error)
          def get_avfoundation_device():
              try:
                  cmd = ["ffmpeg", "-f", "avfoundation", "-list_devices", "true", "-i", ""]
                  result = subprocess.run(cmd, capture_output=True, text=True)
                  output = result.stderr
                  
                  # Look for "[index] Capture screen"
                  match = re.search(r'\[(\d+)\] Capture screen', output)
                  if match:
                      idx = match.group(1)
                      print(f"Found Screen at Index: {idx}")
                      return idx
              except:
                  pass
              print("Defaulting to input '1'")
              return "1" 

          async def handle_input(channel):
              @channel.on("message")
              def on_message(message):
                  try:
                      data = json.loads(message)
                      t = data.get('type')
                      sw, sh = get_screen_size()

                      if t == 'mousemove':
                          # Coordinates are 0.0-1.0 from client, mapped to screen size
                          x = int(data['x'] * sw)
                          y = int(data['y'] * sh)
                          mouse.position = (x, y)
                      elif t == 'mousedown':
                          mouse.press(Button.left)
                      elif t == 'mouseup':
                          mouse.release(Button.left)
                      elif t == 'keydown':
                          keyboard.press(data['key'])
                      elif t == 'keyup':
                          keyboard.release(data['key'])
                  except:
                      pass

          async def run():
              print(f"Connecting to: {WS_URL}")
              
              ssl_ctx = ssl.create_default_context()
              ssl_ctx.check_hostname = False
              ssl_ctx.verify_mode = ssl.CERT_NONE
              
              async with websockets.connect(WS_URL, ssl=ssl_ctx) as ws:
                  print("Connected.")
                  pc = None
                  
                  while True:
                      msg = await ws.recv()
                      
                      if msg == "start":
                          config = RTCConfiguration(iceServers=ICE_SERVERS)
                          pc = RTCPeerConnection(config)
                          
                          # Dynamic Screen Selection
                          dev_idx = get_avfoundation_device()
                          
                          # Optimized Media Player settings
                          player = MediaPlayer(dev_idx, format="avfoundation", options={
                              "framerate": "30",
                              "pixel_format": "uyvy422",
                              "probesize": "32",
                              "analyzeduration": "0",
                              "video_size": f"{get_screen_size()[0]}x{get_screen_size()[1]}"
                          })
                          
                          pc.addTrack(player.video)
                          
                          dc = pc.createDataChannel("input")
                          await handle_input(dc)

                          offer = await pc.createOffer()
                          await pc.setLocalDescription(offer)
                          
                          await ws.send(json.dumps({
                              "type": pc.localDescription.type,
                              "sdp": pc.localDescription.sdp
                          }))

                      else:
                          try:
                              data = json.loads(msg)
                              if data.get("type") == "answer":
                                  await pc.setRemoteDescription(RTCSessionDescription(sdp=data["sdp"], type=data["type"]))
                              elif data.get("candidate"):
                                  if pc: await pc.addIceCandidate(data["candidate"])
                          except:
                              pass
                      
                      await asyncio.sleep(0.01)

          if __name__ == "__main__":
              asyncio.run(run())
          EOF

      - name: Start Host
        run: python host.py
