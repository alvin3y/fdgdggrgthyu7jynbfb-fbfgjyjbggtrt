name: Native WebRTC Stream

on: 
  workflow_dispatch:

jobs:
  native-stream:
    runs-on: macos-latest
    
    env:
      PKG_CONFIG_PATH: "/opt/homebrew/lib/pkgconfig"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies & Create Admin User 'Alvin'
        run: |
          # 1. Install System Dependencies
          brew install ffmpeg pkg-config opus libvpx
          brew install cliclick
          brew install cloudflare/cloudflare/cloudflared
          
          # 2. Create user 'Alvin'
          echo "Creating user Alvin..."
          sudo dscl . -create /Users/Alvin
          sudo dscl . -create /Users/Alvin UserShell /bin/zsh
          sudo dscl . -create /Users/Alvin RealName "Alvin"
          sudo dscl . -create /Users/Alvin UniqueID 503
          sudo dscl . -create /Users/Alvin PrimaryGroupID 20
          sudo dscl . -create /Users/Alvin NFSHomeDirectory /Users/Alvin
          
          # 3. Set password to 'alvin2007'
          sudo dscl . -passwd /Users/Alvin "alvin2007"
          
          # 4. Grant Administrator Privileges (Add to admin group)
          sudo dscl . -append /Groups/admin GroupMembership Alvin
          
          # 5. Enable Passwordless Sudo for Alvin (True Admin Control)
          echo "Alvin ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/alvin
          
          # 6. Create Home Directory
          sudo createhomedir -c -u Alvin > /dev/null

          # 7. Configure VNC with Alvin's password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpw -vncpw "alvin2007" \
          -restart -agent -privs -all

      - name: Setup noVNC (As Alvin)
        run: |
          # Create a tools directory for Alvin
          sudo -u Alvin mkdir -p /Users/Alvin/tools
          
          # Clone tools directly as Alvin so he owns them
          sudo -u Alvin git clone https://github.com/novnc/noVNC.git /Users/Alvin/tools/noVNC
          sudo -u Alvin git clone https://github.com/novnc/websockify.git /Users/Alvin/tools/websockify

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries (System-Wide)
        run: |
          # Install libraries globally so Alvin can access them
          sudo pip install --upgrade pip
          sudo pip install aiortc aiohttp websockets pynput numpy pyobjc-framework-Quartz
          sudo pip install av --no-binary av

      - name: Create and Dock NoVNC Launcher (As Alvin)
        run: |
          # 1. Create the helper shell script
          # We write it to a temp file first, then move it to Alvin's folder with correct permissions
          cat << 'EOF' > start_novnc.sh
          #!/bin/bash
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          
          echo "----------------------------------------"
          echo "Starting noVNC Bridge (Web Port 6080 -> VNC 5900)..."
          echo "----------------------------------------"
          
          /Users/Alvin/tools/websockify/run 6080 localhost:5900 --web=/Users/Alvin/tools/noVNC > /tmp/novnc.log 2>&1 &
          
          sleep 2
          
          echo "----------------------------------------"
          echo "Starting Cloudflare Tunnel..."
          echo "Check the URL below to access noVNC:"
          echo "----------------------------------------"
          
          cloudflared tunnel --url http://localhost:6080
          EOF
          
          # Move to Alvin's tools and set executable
          sudo mv start_novnc.sh /Users/Alvin/tools/start_novnc.sh
          sudo chown Alvin:staff /Users/Alvin/tools/start_novnc.sh
          sudo chmod +x /Users/Alvin/tools/start_novnc.sh

          # 2. Create the AppleScript wrapper
          cat << 'EOF' > start_novnc.applescript
          tell application "Terminal"
              do script "/Users/Alvin/tools/start_novnc.sh"
              activate
          end tell
          EOF
          
          # 3. Compile App as Alvin
          # Ensure Desktop exists
          sudo -u Alvin mkdir -p /Users/Alvin/Desktop
          sudo -u Alvin osacompile -o /Users/Alvin/Desktop/StartNoVNC.app start_novnc.applescript

          # 4. Add to Alvin's Dock
          sudo -u Alvin defaults write com.apple.dock persistent-apps -array-add "<dict><key>tile-data</key><dict><key>file-data</key><dict><key>_CFURLString</key><string>/Users/Alvin/Desktop/StartNoVNC.app</string><key>_CFURLStringType</key><integer>0</integer></dict></dict></dict>"
          
          # 5. Restart Dock to apply changes
          sudo killall Dock || true

      - name: Create Native Host Script (For Alvin)
        run: |
          cat << 'EOF' > host.py
          import asyncio
          import json
          import ssl
          import websockets
          import logging
          from aiortc import RTCPeerConnection, RTCSessionDescription, VideoStreamTrack, RTCIceServer, RTCConfiguration
          from aiortc.contrib.media import MediaPlayer
          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Key, Controller as KeyboardController
          import Quartz # For screen resolution

          # --- CONFIGURATION ---
          WS_URL = "wss://alvin3y1-forward.hf.space/macos"
          
          ICE_SERVERS = [
              RTCIceServer(
                  urls=["turns:turn.cloudflare.com:443?transport=tcp", "turn:turn.cloudflare.com:3478?transport=udp"],
                  username="g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6",
                  credential="aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d"
              )
          ]

          mouse = MouseController()
          keyboard = KeyboardController()

          # --- RESOLUTION DETECTION ---
          main_display_id = Quartz.CGMainDisplayID()
          screen_width = Quartz.CGDisplayPixelsWide(main_display_id)
          screen_height = Quartz.CGDisplayPixelsHigh(main_display_id)
          print(f"Native Resolution: {screen_width}x{screen_height}")

          # --- KEY MAPPING ---
          KEY_MAP = {
              'space': Key.space, 'Return': Key.enter, 'BackSpace': Key.backspace,
              'Tab': Key.tab, 'Escape': Key.esc,
              'Control_L': Key.ctrl_l, 'Control_R': Key.ctrl_r,
              'Shift_L': Key.shift, 'Shift_R': Key.shift_r,
              'Alt_L': Key.alt, 'Alt_R': Key.alt_r,
              'Super_L': Key.cmd, 'cmd': Key.cmd,
              'Up': Key.up, 'Down': Key.down, 'Left': Key.left, 'Right': Key.right,
              'Home': Key.home, 'End': Key.end, 'Page_Up': Key.page_up, 'Page_Down': Key.page_down,
              'Delete': Key.delete,
              'F1': Key.f1, 'F2': Key.f2, 'F3': Key.f3, 'F4': Key.f4,
              'F5': Key.f5, 'F6': Key.f6, 'F7': Key.f7, 'F8': Key.f8, 
              'F9': Key.f9, 'F10': Key.f10, 'F11': Key.f11, 'F12': Key.f12
          }

          async def handle_input(channel):
              @channel.on("message")
              def on_message(message):
                  try:
                      data = json.loads(message)
                      t = data.get('type')

                      if t == 'mousemove':
                          x = int(data['x'] * screen_width)
                          y = int(data['y'] * screen_height)
                          mouse.position = (x, y)
                      
                      elif t == 'mousedown':
                          btn = Button.left
                          if data['button'] == 1: btn = Button.middle
                          elif data['button'] == 2: btn = Button.right
                          mouse.press(btn)

                      elif t == 'mouseup':
                          btn = Button.left
                          if data['button'] == 1: btn = Button.middle
                          elif data['button'] == 2: btn = Button.right
                          mouse.release(btn)
                      
                      elif t == 'wheel':
                          dx = data.get('deltaX', 0)
                          dy = data.get('deltaY', 0)
                          mouse.scroll(-dx * 0.1, -dy * 0.1)

                      elif t == 'keydown':
                          k = data['key']
                          if k in KEY_MAP: keyboard.press(KEY_MAP[k])
                          elif len(k) == 1: keyboard.press(k)
                      
                      elif t == 'keyup':
                          k = data['key']
                          if k in KEY_MAP: keyboard.release(KEY_MAP[k])
                          elif len(k) == 1: keyboard.release(k)

                  except Exception as e:
                      print(f"Input Error: {e}")

          async def run():
              print(f"Connecting to: {WS_URL}")
              
              ssl_context = ssl.create_default_context()
              ssl_context.check_hostname = False
              ssl_context.verify_mode = ssl.CERT_NONE
              
              async with websockets.connect(WS_URL, ssl=ssl_context) as ws:
                  print("Connected. Waiting for 'start'...")
                  
                  pc = None
                  
                  while True:
                      msg = await ws.recv()
                      
                      if msg == "start":
                          print("Start trigger received.")
                          
                          config = RTCConfiguration(iceServers=ICE_SERVERS)
                          pc = RTCPeerConnection(config)
                          
                          # --- NATIVE STREAMING SETUP ---
                          try:
                              player = MediaPlayer("0", format="avfoundation", options={
                                  "framerate": "30",
                                  "video_size": f"{screen_width}x{screen_height}", 
                                  "pixel_format": "uyvy422",
                                  "probesize": "32",
                                  "analyzeduration": "0",
                                  "capture_cursor": "1",
                                  "capture_mouse_clicks": "1"
                              })
                              pc.addTrack(player.video)
                          except Exception as e:
                              print(f"Media Error: {e}")
                              return

                          dc = pc.createDataChannel("input")
                          await handle_input(dc)

                          @pc.on("iceconnectionstatechange")
                          async def on_ice_state_change():
                              print(f"ICE State: {pc.iceConnectionState}")

                          offer = await pc.createOffer()
                          await pc.setLocalDescription(offer)
                          
                          await ws.send(json.dumps({
                              "type": pc.localDescription.type,
                              "sdp": pc.localDescription.sdp
                          }))
                          print("Offer sent.")

                      else:
                          try:
                              data = json.loads(msg)
                              if data.get("type") == "answer":
                                  print("Received Answer.")
                                  desc = RTCSessionDescription(sdp=data["sdp"], type=data["type"])
                                  await pc.setRemoteDescription(desc)
                          except:
                              pass
                      
                      await asyncio.sleep(0.01)

          if __name__ == "__main__":
              asyncio.run(run())
          EOF
          
          # Move script to Alvin's home and set ownership
          sudo mv host.py /Users/Alvin/host.py
          sudo chown Alvin:staff /Users/Alvin/host.py

      - name: Start Host (As Alvin)
        run: |
          # Run the main script as the user Alvin
          # We export PATH so Alvin sees the Homebrew installed packages
          sudo -u Alvin PATH=$PATH:/opt/homebrew/bin PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig" python /Users/Alvin/host.py
