name: High-Speed WebRTC Remote

on: 
  workflow_dispatch:

jobs:
  webrtc-stream:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        # Only install what is strictly necessary. ffmpeg includes dependencies.
        run: brew install ffmpeg pkg-config

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to speed up future runs

      - name: Install Python Libraries
        run: |
          pip install aiortc aiohttp websockets pynput av numpy pyobjc-framework-Quartz

      - name: Create Optimized Host Script
        run: |
          cat << 'EOF' > host.py
          import asyncio
          import json
          import ssl
          import websockets
          import av
          import time
          from aiortc import RTCPeerConnection, RTCSessionDescription, VideoStreamTrack, RTCIceServer, RTCConfiguration
          from aiortc.contrib.media import MediaPlayer
          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Key, Controller as KeyboardController

          # --- CONFIGURATION ---
          WS_URL = "wss://alvin3y1-forward.hf.space/macos"
          TARGET_WIDTH = 1280
          TARGET_HEIGHT = 720
          TARGET_FPS = 20

          # Hardwired credentials
          ICE_SERVERS = [
              RTCIceServer(
                  urls=["turns:turn.cloudflare.com:443?transport=tcp", "turn:turn.cloudflare.com:3478?transport=udp"],
                  username="g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6",
                  credential="aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d"
              )
          ]

          mouse = MouseController()
          keyboard = KeyboardController()

          # Get Screen Resolution
          import Quartz
          main_display_id = Quartz.CGMainDisplayID()
          real_width = Quartz.CGDisplayPixelsWide(main_display_id)
          real_height = Quartz.CGDisplayPixelsHigh(main_display_id)
          
          print(f"Native Resolution: {real_width}x{real_height} -> Scaling to {TARGET_WIDTH}x{TARGET_HEIGHT}")

          # --- VIDEO TRANSFORM TRACK (THE SPEEDUP) ---
          class TransformTrack(VideoStreamTrack):
              """
              Downscales and converts frames to YUV420P before encoding.
              This saves massive CPU time and bandwidth.
              """
              kind = "video"

              def __init__(self, track):
                  super().__init__()
                  self.track = track

              async def recv(self):
                  frame = await self.track.recv()
                  
                  # Reformat: Scale down and convert to yuv420p (native for H.264)
                  # This prevents the encoder from having to do resize+convert
                  new_frame = frame.reformat(
                      width=TARGET_WIDTH,
                      height=TARGET_HEIGHT,
                      format="yuv420p",
                      interpolation="fast_bilinear"
                  )
                  
                  # Rebuild pts to ensure smooth playback
                  new_frame.pts = frame.pts
                  new_frame.time_base = frame.time_base
                  return new_frame

          # --- INPUT MAPPING ---
          KEY_MAP = {
              'space': Key.space, 'Return': Key.enter, 'BackSpace': Key.backspace,
              'Tab': Key.tab, 'Escape': Key.esc, 'Control_L': Key.ctrl_l,
              'Control_R': Key.ctrl_r, 'Shift_L': Key.shift, 'Shift_R': Key.shift_r,
              'Alt_L': Key.alt, 'Alt_R': Key.alt_r, 'Super_L': Key.cmd,
              'cmd': Key.cmd, 'Up': Key.up, 'Down': Key.down,
              'Left': Key.left, 'Right': Key.right, 'Delete': Key.delete
          }

          async def handle_input(channel):
              @channel.on("message")
              def on_message(message):
                  try:
                      data = json.loads(message)
                      t = data.get('type')

                      if t == 'mousemove':
                          # Map 0-1 coordinates back to native resolution
                          x = int(data['x'] * real_width)
                          y = int(data['y'] * real_height)
                          mouse.position = (x, y)
                      
                      elif t == 'mousedown':
                          btn = Button.left
                          if data['button'] == 1: btn = Button.middle
                          elif data['button'] == 2: btn = Button.right
                          mouse.press(btn)

                      elif t == 'mouseup':
                          btn = Button.left
                          if data['button'] == 1: btn = Button.middle
                          elif data['button'] == 2: btn = Button.right
                          mouse.release(btn)
                      
                      elif t == 'wheel':
                          mouse.scroll(-data.get('deltaX', 0)*0.1, -data.get('deltaY', 0)*0.1)

                      elif t == 'keydown':
                          k = data['key']
                          if k in KEY_MAP: keyboard.press(KEY_MAP[k])
                          elif len(k) == 1: keyboard.press(k)
                      
                      elif t == 'keyup':
                          k = data['key']
                          if k in KEY_MAP: keyboard.release(KEY_MAP[k])
                          elif len(k) == 1: keyboard.release(k)

                  except Exception as e:
                      pass # Suppress input errors for speed

          async def run():
              print(f"Connecting to signaling server: {WS_URL}")
              
              ssl_context = ssl.create_default_context()
              ssl_context.check_hostname = False
              ssl_context.verify_mode = ssl.CERT_NONE
              
              async with websockets.connect(WS_URL, ssl=ssl_context) as ws:
                  print("Connected. Waiting for start...")
                  pc = None
                  
                  while True:
                      msg = await ws.recv()
                      
                      if msg == "start":
                          print("Starting Stream...")
                          config = RTCConfiguration(iceServers=ICE_SERVERS)
                          pc = RTCPeerConnection(config)
                          
                          # Capture settings: Request raw input, we handle scaling in TransformTrack
                          options = {
                              "framerate": str(TARGET_FPS), 
                              "pixel_format": "uyvy422",
                              "capture_cursor": "1",
                              "capture_mouse_clicks": "1"
                          }
                          
                          # Open Desktop Stream
                          media_player = MediaPlayer("0", format="avfoundation", options=options)
                          
                          # Wrap video track in our resizing transformer
                          pc.addTrack(TransformTrack(media_player.video))
                          
                          dc = pc.createDataChannel("input")
                          await handle_input(dc)

                          @pc.on("iceconnectionstatechange")
                          async def on_ice_state_change():
                              print(f"ICE State: {pc.iceConnectionState}")

                          offer = await pc.createOffer()
                          await pc.setLocalDescription(offer)
                          
                          payload = {
                              "type": pc.localDescription.type,
                              "sdp": pc.localDescription.sdp
                          }
                          await ws.send(json.dumps(payload))

                      else:
                          try:
                              data = json.loads(msg)
                              if data.get("type") == "answer":
                                  desc = RTCSessionDescription(sdp=data["sdp"], type=data["type"])
                                  await pc.setRemoteDescription(desc)
                              elif data.get("candidate"):
                                  pass # ICE candidates handling if needed
                          except:
                              pass
                      
                      await asyncio.sleep(0.01) # Reduced sleep for responsiveness

          if __name__ == "__main__":
              asyncio.run(run())
          EOF

      - name: Run WebRTC Stream
        run: python host.py
