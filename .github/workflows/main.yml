name: High-Speed Optimized Stream

on: 
  workflow_dispatch:

jobs:
  stream-and-loop:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: brew install ffmpeg cliclick

      - name: Start Ultra-Fast Hardware Stream
        run: |
          # 1. -probesize & -analyzeduration: Reduces startup lag by skipping stream analysis.
          # 2. -c:v h264_videotoolbox: Uses Apple Hardware Encoding (fastest possible on Mac).
          # 3. -realtime 1: Forces the engine to prioritize speed over quality.
          # 4. -g 60: Sets keyframes for Twitch (2-second intervals at 30fps).
          
          ffmpeg -hide_banner -loglevel error \
            -probesize 32 -analyzeduration 0 \
            -f avfoundation -capture_cursor 1 -i "0" \
            -vf "scale=1280:-1,format=yuv420p" -r 30 \
            -c:v h264_videotoolbox -realtime 1 -allow_sw 1 \
            -b:v 2500k -maxrate 2500k -bufsize 1000k \
            -g 60 -tune zerolatency -pix_fmt yuv420p \
            -f flv "rtmp://iad05.contribute.live-video.net/app/live_1448220741_99LXQ4TGollmTzBeQLQmSEf7UCby3B" &
          
          sleep 5 # Reduced wait time because hardware encoding starts faster

      - name: Smooth Safari Loop
        run: |
          while true; do
            open -a Safari
            sleep 3
            
            # Use Cmd+L (Address bar) - it's faster than moving the mouse there
            osascript -e 'tell application "System Events" to keystroke "l" using command down'
            cliclick t:"google.com"
            cliclick kp:return
            
            sleep 5
            
            # Smooth slide to close (easing 30 is faster but still looks smooth)
            cliclick -e 30 m:25,55
            cliclick c:25,55
            
            sleep 2
          done
