name: Native WebRTC Stream

on: 
  workflow_dispatch:

jobs:
  native-stream:
    runs-on: macos-latest
    
    env:
      PKG_CONFIG_PATH: "/opt/homebrew/lib/pkgconfig"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          brew install ffmpeg pkg-config opus libvpx
          brew install cliclick
          # displayplacer allows changing resolution via CLI
          brew install displayplacer

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: |
          pip install --upgrade pip
          pip install aiortc aiohttp websockets pynput numpy pyobjc-framework-Quartz
          pip install av --no-binary av

      - name: Create Native Host Script
        run: |
          cat << 'EOF' > host.py
          import asyncio
          import json
          import ssl
          import websockets
          import subprocess
          import re
          from aiortc import RTCPeerConnection, RTCSessionDescription, VideoStreamTrack, RTCIceServer, RTCConfiguration
          from aiortc.contrib.media import MediaPlayer
          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Key, Controller as KeyboardController
          import Quartz

          WS_URL = "wss://alvin3y1-forward.hf.space/macos"
          ICE_SERVERS = [
              RTCIceServer(
                  urls=["turns:turn.cloudflare.com:443?transport=tcp", "turn:turn.cloudflare.com:3478?transport=udp"],
                  username="g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6",
                  credential="aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d"
              )
          ]

          mouse = MouseController()
          keyboard = KeyboardController()
          
          # Global reference to the media player to restart it if resolution changes
          current_player = None
          
          def get_screen_size():
              main_display_id = Quartz.CGMainDisplayID()
              w = Quartz.CGDisplayPixelsWide(main_display_id)
              h = Quartz.CGDisplayPixelsHigh(main_display_id)
              return w, h

          def set_system_resolution(target_w, target_h):
              """
              Uses displayplacer to switch the macOS system resolution.
              Since VMs have limited resolutions, we look for the available one
              that best matches the requested aspect ratio and size.
              """
              try:
                  # 1. Get list of available resolutions
                  result = subprocess.run(['displayplacer', 'list'], capture_output=True, text=True)
                  output = result.stdout
                  
                  # Parse main display ID
                  id_match = re.search(r'Persistent screen id: ([^ \n]+)', output)
                  if not id_match: return False
                  screen_id = id_match.group(1)

                  # 2. Find closest resolution
                  # Helper to parse "Resolution: 1280x720" lines
                  available_res = []
                  for line in output.split('\n'):
                      if "Resolution:" in line:
                          parts = line.split(':')[1].strip().split('x')
                          if len(parts) >= 2:
                              w = int(parts[0])
                              # Handles cases like "1280x720@60Hz"
                              h = int(parts[1].split('@')[0].split(' ')[0])
                              available_res.append((w, h))

                  if not available_res: return False

                  # Logic: Find resolution with closest width that is <= target
                  # This prevents setting a resolution higher than the VM can render
                  best_w, best_h = available_res[0]
                  min_diff = float('inf')

                  for w, h in available_res:
                      diff = abs(w - target_w) + abs(h - target_h)
                      if diff < min_diff:
                          min_diff = diff
                          best_w, best_h = w, h

                  print(f"Changing System Resolution to: {best_w}x{best_h} (Requested: {target_w}x{target_h})")
                  subprocess.run(['displayplacer', f"id:{screen_id}", f"res:{best_w}x{best_h}"], check=True)
                  return True
              except Exception as e:
                  print(f"Resolution switch failed: {e}")
                  return False

          KEY_MAP = {
              'space': Key.space, 'Return': Key.enter, 'BackSpace': Key.backspace,
              'Tab': Key.tab, 'Escape': Key.esc,
              'Control_L': Key.ctrl_l, 'Control_R': Key.ctrl_r,
              'Shift_L': Key.shift, 'Shift_R': Key.shift_r,
              'Alt_L': Key.alt, 'Alt_R': Key.alt_r,
              'Super_L': Key.cmd, 'cmd': Key.cmd,
              'Up': Key.up, 'Down': Key.down, 'Left': Key.left, 'Right': Key.right,
              'Home': Key.home, 'End': Key.end, 'Delete': Key.delete
          }

          async def handle_input(channel, pc):
              @channel.on("message")
              def on_message(message):
                  try:
                      data = json.loads(message)
                      t = data.get('type')
                      
                      # Get current dynamic resolution
                      sw, sh = get_screen_size()

                      if t == 'mousemove':
                          x = int(data['x'] * sw)
                          y = int(data['y'] * sh)
                          mouse.position = (x, y)
                      
                      elif t == 'mousedown':
                          btn = Button.left
                          if data['button'] == 2: btn = Button.right
                          elif data['button'] == 1: btn = Button.middle
                          mouse.press(btn)

                      elif t == 'mouseup':
                          btn = Button.left
                          if data['button'] == 2: btn = Button.right
                          elif data['button'] == 1: btn = Button.middle
                          mouse.release(btn)
                      
                      elif t == 'wheel':
                          mouse.scroll(-data.get('deltaX', 0)*0.1, -data.get('deltaY', 0)*0.1)

                      elif t == 'keydown':
                          k = data['key']
                          if k in KEY_MAP: keyboard.press(KEY_MAP[k])
                          elif len(k) == 1: keyboard.press(k)
                      
                      elif t == 'keyup':
                          k = data['key']
                          if k in KEY_MAP: keyboard.release(KEY_MAP[k])
                          elif len(k) == 1: keyboard.release(k)
                      
                      elif t == 'resize':
                          # Attempt to change actual OS resolution
                          w, h = data.get('width'), data.get('height')
                          success = set_system_resolution(w, h)
                          
                          # Note: Changing resolution usually requires the stream to be 
                          # re-negotiated or the ffmpeg process usually adapts automatically 
                          # because we set analyzeduration=0.
                          if success:
                              print("Resolution changed. Input mapping will update on next event.")

                  except Exception as e:
                      print(f"Input Error: {e}")

          async def run():
              print(f"Connecting to: {WS_URL}")
              
              ssl_context = ssl.create_default_context()
              ssl_context.check_hostname = False
              ssl_context.verify_mode = ssl.CERT_NONE
              
              async with websockets.connect(WS_URL, ssl=ssl_context) as ws:
                  print("Connected. Waiting for 'start'...")
                  
                  pc = None
                  
                  while True:
                      msg = await ws.recv()
                      
                      if msg == "start":
                          config = RTCConfiguration(iceServers=ICE_SERVERS)
                          pc = RTCPeerConnection(config)
                          
                          w, h = get_screen_size()
                          print(f"Starting stream at: {w}x{h}")

                          # AVFoundation Capture
                          # We do NOT set video_size here, letting it default to current screen size
                          # so it can adapt if displayplacer changes it.
                          try:
                              player = MediaPlayer("0", format="avfoundation", options={
                                  "framerate": "30",
                                  "pixel_format": "uyvy422",
                                  "capture_cursor": "1",
                                  "capture_mouse_clicks": "1",
                                  "probesize": "32" 
                              })
                              pc.addTrack(player.video)
                          except Exception as e:
                              print(f"Media Error: {e}")
                              return

                          dc = pc.createDataChannel("input")
                          await handle_input(dc, pc)

                          @pc.on("iceconnectionstatechange")
                          async def on_ice_state_change():
                              print(f"ICE State: {pc.iceConnectionState}")

                          offer = await pc.createOffer()
                          await pc.setLocalDescription(offer)
                          
                          await ws.send(json.dumps({
                              "type": pc.localDescription.type,
                              "sdp": pc.localDescription.sdp
                          }))

                      else:
                          try:
                              data = json.loads(msg)
                              if data.get("type") == "answer":
                                  await pc.setRemoteDescription(RTCSessionDescription(sdp=data["sdp"], type=data["type"]))
                          except:
                              pass
                      
                      await asyncio.sleep(0.01)

          if __name__ == "__main__":
              asyncio.run(run())
          EOF

      - name: Start Host
        run: python host.py
