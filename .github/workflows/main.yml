name: Real-Time macOS Screen Stream

on: 
  workflow_dispatch:

jobs:
  stream-screen:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: List Available Devices (Debug)
        run: ffmpeg -f avfoundation -list_devices true -i "" || true

      - name: Open App
        run: open -a Calculator

      - name: Start 30fps Screen Stream
        run: |
          # Changed -i "1" to -i "0" based on your error log
          ffmpeg -f avfoundation -capture_cursor 1 -i "0" \
            -vf "scale=1280:-1" -r 30 \
            -c:v libx264 -preset ultrafast -tune zerolatency \
            -pix_fmt yuv420p -b:v 2500k \
            -f flv "rtmp://iad05.contribute.live-video.net/app/live_1448220741_99LXQ4TGollmTzBeQLQmSEf7UCby3B"
