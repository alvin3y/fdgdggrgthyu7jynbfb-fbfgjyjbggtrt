name: Native WebRTC Stream

on: 
  workflow_dispatch:

jobs:
  native-stream:
    runs-on: macos-latest
    
    env:
      PKG_CONFIG_PATH: "/opt/homebrew/lib/pkgconfig"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. SETUP PYTHON
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' 

      # 2. INSTALL DEPENDENCIES
      - name: Install Dependencies
        run: |
          brew install ffmpeg pkg-config opus libvpx cliclick cloudflare/cloudflare/cloudflared
          pip install --upgrade pip
          pip install aiortc aiohttp websockets pynput numpy pyobjc-framework-Quartz av
          pip install numpy

      # 3. CONFIGURE VNC (User 'Alvin')
      - name: Configure VNC User & Server
        run: |
          sudo dscl . -create /Users/Alvin
          sudo dscl . -create /Users/Alvin UserShell /bin/zsh
          sudo dscl . -create /Users/Alvin RealName "Alvin"
          sudo dscl . -create /Users/Alvin UniqueID 503
          sudo dscl . -create /Users/Alvin PrimaryGroupID 20
          sudo dscl . -create /Users/Alvin NFSHomeDirectory /Users/Alvin
          sudo dscl . -passwd /Users/Alvin "alvin2007"
          sudo dscl . -append /Groups/admin GroupMembership Alvin
          sudo createhomedir -c -u Alvin > /dev/null

          # Enable Screen Sharing with Legacy Password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpw -vncpw "alvin2007" \
          -restart -agent -privs -all

      # 4. START NOVNC & CLOUDFLARE (Improved URL Detection)
      - name: Start noVNC & Cloudflare Tunnel
        run: |
          cd /Users/runner
          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify.git noVNC/utils/websockify

          echo "Starting Websockify..."
          # Using Absolute Path
          ./noVNC/utils/websockify/run --web /Users/runner/noVNC 6080 localhost:5900 > /tmp/novnc.log 2>&1 &
          
          # Wait for Websockify
          for i in {1..10}; do
            if lsof -Pi :6080 -sTCP:LISTEN -t >/dev/null; then
              echo "Websockify is UP on port 6080."
              break
            fi
            sleep 1
          done

          echo "Starting Cloudflare Tunnel..."
          # Start tunnel with specific logfile
          cloudflared tunnel --url http://localhost:6080 --logfile /tmp/tunnel.log > /dev/null 2>&1 &
          
          echo "Waiting for Tunnel URL..."
          TUNNEL_URL=""
          for i in {1..30}; do
            # Grep for the specific trycloudflare URL pattern, excluding the API/Error domains
            TUNNEL_URL=$(grep -o 'https://[-a-z0-9]*\.trycloudflare\.com' /tmp/tunnel.log | grep -v "api.trycloudflare.com" | head -n 1)
            
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: Cloudflare Tunnel failed to return a valid URL."
            echo "--- Tunnel Logs ---"
            cat /tmp/tunnel.log
          else
            echo "========================================================"
            echo "              VNC STREAM URL (Backup)                   "
            echo "========================================================"
            echo "URL: $TUNNEL_URL"
            echo ""
            echo "VNC Password: alvin2007"
            echo "========================================================"
          fi

      # 5. CREATE & RUN PYTHON HOST
      - name: Create Native Host Script
        run: |
          cat << 'EOF' > host.py
          import asyncio
          import json
          import ssl
          import websockets
          import logging
          from aiortc import RTCPeerConnection, RTCSessionDescription, VideoStreamTrack, RTCIceServer, RTCConfiguration
          from aiortc.contrib.media import MediaPlayer
          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Key, Controller as KeyboardController
          import Quartz 

          WS_URL = "wss://alvin3y1-forward.hf.space/macos"
          
          ICE_SERVERS = [
              RTCIceServer(
                  urls=["turns:turn.cloudflare.com:443?transport=tcp", "turn:turn.cloudflare.com:3478?transport=udp"],
                  username="g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6",
                  credential="aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d"
              )
          ]

          mouse = MouseController()
          keyboard = KeyboardController()

          main_display_id = Quartz.CGMainDisplayID()
          screen_width = Quartz.CGDisplayPixelsWide(main_display_id)
          screen_height = Quartz.CGDisplayPixelsHigh(main_display_id)
          print(f"Native Resolution: {screen_width}x{screen_height}")

          KEY_MAP = {
              'space': Key.space, 'Return': Key.enter, 'BackSpace': Key.backspace,
              'Tab': Key.tab, 'Escape': Key.esc,
              'Control_L': Key.ctrl_l, 'Control_R': Key.ctrl_r,
              'Shift_L': Key.shift, 'Shift_R': Key.shift_r,
              'Alt_L': Key.alt, 'Alt_R': Key.alt_r,
              'Super_L': Key.cmd, 'cmd': Key.cmd,
              'Up': Key.up, 'Down': Key.down, 'Left': Key.left, 'Right': Key.right,
              'Home': Key.home, 'End': Key.end, 'Page_Up': Key.page_up, 'Page_Down': Key.page_down,
              'Delete': Key.delete,
              'F1': Key.f1, 'F2': Key.f2, 'F3': Key.f3, 'F4': Key.f4,
              'F5': Key.f5, 'F6': Key.f6, 'F7': Key.f7, 'F8': Key.f8, 
              'F9': Key.f9, 'F10': Key.f10, 'F11': Key.f11, 'F12': Key.f12
          }

          async def handle_input(channel):
              @channel.on("message")
              def on_message(message):
                  try:
                      data = json.loads(message)
                      t = data.get('type')

                      if t == 'mousemove':
                          x = int(data['x'] * screen_width)
                          y = int(data['y'] * screen_height)
                          mouse.position = (x, y)
                      
                      elif t == 'mousedown':
                          btn = Button.left
                          if data['button'] == 1: btn = Button.middle
                          elif data['button'] == 2: btn = Button.right
                          mouse.press(btn)

                      elif t == 'mouseup':
                          btn = Button.left
                          if data['button'] == 1: btn = Button.middle
                          elif data['button'] == 2: btn = Button.right
                          mouse.release(btn)
                      
                      elif t == 'wheel':
                          dx = data.get('deltaX', 0)
                          dy = data.get('deltaY', 0)
                          mouse.scroll(-dx * 0.1, -dy * 0.1)

                      elif t == 'keydown':
                          k = data['key']
                          if k in KEY_MAP: keyboard.press(KEY_MAP[k])
                          elif len(k) == 1: keyboard.press(k)
                      
                      elif t == 'keyup':
                          k = data['key']
                          if k in KEY_MAP: keyboard.release(KEY_MAP[k])
                          elif len(k) == 1: keyboard.release(k)

                  except Exception as e:
                      print(f"Input Error: {e}")

          async def run():
              print(f"Connecting to Signaling Server: {WS_URL}")
              
              ssl_context = ssl.create_default_context()
              ssl_context.check_hostname = False
              ssl_context.verify_mode = ssl.CERT_NONE
              
              async with websockets.connect(WS_URL, ssl=ssl_context) as ws:
                  print("Connected. Waiting for 'start'...")
                  
                  pc = None
                  
                  while True:
                      msg = await ws.recv()
                      
                      if msg == "start":
                          print("Start trigger received.")
                          
                          config = RTCConfiguration(iceServers=ICE_SERVERS)
                          pc = RTCPeerConnection(config)
                          
                          try:
                              player = MediaPlayer("0", format="avfoundation", options={
                                  "framerate": "30",
                                  "video_size": f"{screen_width}x{screen_height}", 
                                  "pixel_format": "uyvy422",
                                  "probesize": "32",
                                  "analyzeduration": "0",
                                  "capture_cursor": "1",
                                  "capture_mouse_clicks": "1"
                              })
                              pc.addTrack(player.video)
                          except Exception as e:
                              print(f"AVFoundation Error: {e}")
                              return

                          dc = pc.createDataChannel("input")
                          await handle_input(dc)

                          @pc.on("iceconnectionstatechange")
                          async def on_ice_state_change():
                              print(f"ICE State: {pc.iceConnectionState}")

                          offer = await pc.createOffer()
                          await pc.setLocalDescription(offer)
                          
                          await ws.send(json.dumps({
                              "type": pc.localDescription.type,
                              "sdp": pc.localDescription.sdp
                          }))
                          print("Offer sent.")

                      else:
                          try:
                              data = json.loads(msg)
                              if data.get("type") == "answer":
                                  print("Received Remote Answer.")
                                  desc = RTCSessionDescription(sdp=data["sdp"], type=data["type"])
                                  await pc.setRemoteDescription(desc)
                          except:
                              pass
                      
                      await asyncio.sleep(0.01)

          if __name__ == "__main__":
              asyncio.run(run())
          EOF

      - name: Start Native Host
        run: python host.py
