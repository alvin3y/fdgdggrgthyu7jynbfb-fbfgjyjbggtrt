name: Native VNC Stream (noVNC)

on: 
  workflow_dispatch:

jobs:
  vnc-stream:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Install Dependencies
      - name: Install Network Tools
        run: |
          brew install websockify
          # Install Cloudflare Tunnel (fast, secure, free tunneling)
          brew install cloudflared

      # 2. Enable Native macOS Screen Sharing
      - name: Enable macOS VNC Server
        run: |
          echo "Enabling Screen Sharing..."
          # Set the password to 'password' (or change as needed)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw password \
            -restart -agent -privs -all

      # 3. Start websockify (Bridges VNC Port 5900 -> WebSocket Port 6080)
      - name: Start Websockify
        run: |
          # Run in background (&)
          websockify 6080 localhost:5900 &
          echo "Websockify running on port 6080"

      # 4. Expose to Internet via Cloudflare Tunnel
      - name: Start Tunnel & Stream
        run: |
          # Use Cloudflare Quick Tunnel to expose port 6080
          # This will output a standard URL like https://random-name.trycloudflare.com
          echo "Starting Cloudflare Tunnel..."
          cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &
          
          # Wait for the URL to be generated
          sleep 10
          TUNNEL_URL=$(grep -o 'https://.*\.trycloudflare.com' tunnel.log | head -n 1)
          
          echo "--------------------------------------------------------"
          echo "🔥 DESKTOP LIVE AT: $TUNNEL_URL/vnc.html?password=password&autoconnect=true"
          echo "--------------------------------------------------------"
          
          # Keep the job alive
          while true; do sleep 60; done
