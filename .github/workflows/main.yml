name: Native WebRTC Stream (Optimized)

on:
  workflow_dispatch:

jobs:
  native-stream:
    runs-on: macos-latest # Ensure this runs on M1/M2/M3 (Apple Silicon) if possible
    
    env:
      # Prevent python buffering for real-time logs
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Create Admin User Alvin
        run: |
          sudo dscl . -create /Users/alvin
          sudo dscl . -create /Users/alvin UserShell /bin/zsh
          sudo dscl . -create /Users/alvin RealName "Alvin"
          sudo dscl . -create /Users/alvin UniqueID 440
          sudo dscl . -create /Users/alvin PrimaryGroupID 20
          sudo dscl . -passwd /Users/alvin alvin
          sudo dscl . -append /Groups/admin GroupMembership alvin
          echo "alvin ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/alvin

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        # Only install minimal requirements. 
        # ffmpeg is needed for the runtime libraries if PyAV doesn't bundle avfoundation support correctly,
        # otherwise displayplacer is the only strict system requirement here.
        run: |
          brew install displayplacer ffmpeg

      - name: Install uv (Fast Python Package Manager)
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: |
          # Use 'uv pip' for 10x faster install
          # REMOVED --no-binary av: This saves ~5 minutes of build time
          ~/.cargo/bin/uv pip install --system aiortc aiohttp websockets pynput numpy pyobjc-framework-Quartz av

      - name: Create Optimized Host Script
        run: |
          cat << 'EOF' > host.py
          import asyncio
          import json
          import ssl
          import websockets
          import subprocess
          import re
          import platform
          from aiortc import RTCPeerConnection, RTCSessionDescription, VideoStreamTrack, RTCIceServer, RTCConfiguration, RTCRtpSender
          from aiortc.contrib.media import MediaPlayer
          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Key, Controller as KeyboardController
          import Quartz

          # --- HARDWARE ACCELERATION MONKEYPATCH ---
          import aiortc.codecs.h264
          import av
          import fractions

          class HardwareH264Encoder(aiortc.codecs.h264.H264Encoder):
              def encode(self, frame, force_keyframe=False):
                  if self.codec is None:
                      # USE APPLE VIDEOTOOLBOX (Hardware Acceleration)
                      # This moves processing from CPU to the Media Engine
                      try:
                          self.codec = av.CodecContext.create("h264_videotoolbox", "w")
                          print("✅ Using Apple VideoToolbox Hardware Acceleration")
                      except Exception as e:
                          print(f"⚠️ VideoToolbox not found, falling back to libx264: {e}")
                          self.codec = av.CodecContext.create("libx264", "w")
                          self.codec.options = {"preset": "ultrafast", "tune": "zerolatency"}

                      self.codec.width = frame.width
                      self.codec.height = frame.height
                      self.codec.pix_fmt = "nv12" # NV12 is native for VideoToolbox
                      self.codec.time_base = fractions.Fraction(1, 90000)
                      
                      # Hardware Specific Real-time Options
                      if self.codec.name == "h264_videotoolbox":
                          self.codec.options = {
                              "realtime": "true",       # Prioritize speed
                              "allow_sw": "0",          # Force hardware only
                              "profile": "baseline",    # Lowest latency profile
                              "b": "2000k",             # Target Bitrate
                              "maxrate": "2500k"        # Max Bitrate
                          }
                      
                  return super().encode(frame, force_keyframe)

          # Apply the patch
          aiortc.codecs.h264.H264Encoder = HardwareH264Encoder
          # -----------------------------------------

          WS_URL = "wss://alvin3y1-forward.hf.space/macos"
          ICE_SERVERS = [
              RTCIceServer(
                  urls=["turns:turn.cloudflare.com:443?transport=tcp", "turn:turn.cloudflare.com:3478?transport=udp"],
                  username="g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6",
                  credential="aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d"
              )
          ]

          mouse = MouseController()
          keyboard = KeyboardController()
          
          def get_screen_size():
              main_display_id = Quartz.CGMainDisplayID()
              w = Quartz.CGDisplayPixelsWide(main_display_id)
              h = Quartz.CGDisplayPixelsHigh(main_display_id)
              return w, h

          def set_system_resolution(target_w, target_h):
              # (Existing resolution logic kept as is - it is efficient enough)
              try:
                  if target_h == 0 or target_w == 0: return False
                  result = subprocess.run(['displayplacer', 'list'], capture_output=True, text=True)
                  output = result.stdout
                  id_match = re.search(r'Persistent screen id: ([^ \n]+)', output)
                  if not id_match: return False
                  screen_id = id_match.group(1)

                  available_res = []
                  for line in output.split('\n'):
                      if "Resolution:" in line:
                          parts = line.split(':')[1].strip().split('x')
                          if len(parts) >= 2:
                              try:
                                  w = int(parts[0])
                                  h = int(parts[1].split('@')[0].split(' ')[0])
                                  available_res.append((w, h))
                              except: continue
                  
                  if not available_res: return False
                  available_res = list(set(available_res))
                  target_ar = target_w / target_h
                  
                  def resolution_score(res):
                      w, h = res
                      return (abs((w/h) - target_ar), abs(w - target_w))

                  available_res.sort(key=resolution_score)
                  best_w, best_h = available_res[0]
                  current_w, current_h = get_screen_size()
                  if best_w == current_w and best_h == current_h: return True
                  subprocess.run(['displayplacer', f"id:{screen_id}", f"res:{best_w}x{best_h}"], check=True)
                  return True
              except: return False

          KEY_MAP = {
              'space': Key.space, 'Return': Key.enter, 'BackSpace': Key.backspace,
              'Tab': Key.tab, 'Escape': Key.esc,
              'Control_L': Key.ctrl_l, 'Control_R': Key.ctrl_r,
              'Shift_L': Key.shift, 'Shift_R': Key.shift_r,
              'Alt_L': Key.alt, 'Alt_R': Key.alt_r,
              'Super_L': Key.cmd, 'cmd': Key.cmd,
              'Up': Key.up, 'Down': Key.down, 'Left': Key.left, 'Right': Key.right
          }

          async def handle_input(channel, pc):
              @channel.on("message")
              def on_message(message):
                  try:
                      data = json.loads(message)
                      t = data.get('type')
                      sw, sh = get_screen_size()

                      if t == 'mousemove':
                          mouse.position = (int(data['x'] * sw), int(data['y'] * sh))
                      elif t == 'mousedown':
                          btn = Button.left if data['button'] == 0 else (Button.right if data['button'] == 2 else Button.middle)
                          mouse.press(btn)
                      elif t == 'mouseup':
                          btn = Button.left if data['button'] == 0 else (Button.right if data['button'] == 2 else Button.middle)
                          mouse.release(btn)
                      elif t == 'wheel':
                          mouse.scroll(-data.get('deltaX', 0)*0.1, -data.get('deltaY', 0)*0.1)
                      elif t == 'keydown':
                          k = data['key']
                          if k in KEY_MAP: keyboard.press(KEY_MAP[k])
                          elif len(k) == 1: keyboard.press(k)
                      elif t == 'keyup':
                          k = data['key']
                          if k in KEY_MAP: keyboard.release(KEY_MAP[k])
                          elif len(k) == 1: keyboard.release(k)
                      elif t == 'resize':
                          set_system_resolution(data.get('width'), data.get('height'))
                  except: pass

          async def run():
              print(f"Connecting to: {WS_URL}")
              ssl_context = ssl.create_default_context()
              ssl_context.check_hostname = False
              ssl_context.verify_mode = ssl.CERT_NONE
              
              async with websockets.connect(WS_URL, ssl=ssl_context) as ws:
                  print("Connected.")
                  pc = None
                  
                  while True:
                      msg = await ws.recv()
                      if msg == "start":
                          config = RTCConfiguration(iceServers=ICE_SERVERS)
                          pc = RTCPeerConnection(config)
                          w, h = get_screen_size()
                          
                          try:
                              # Optimized MediaPlayer options
                              player = MediaPlayer("0", format="avfoundation", options={
                                  "framerate": "30",
                                  "video_size": f"{w}x{h}",
                                  "pixel_format": "nv12", # Match HW Encoder format to skip software conversion
                                  "capture_cursor": "1",
                                  "capture_mouse_clicks": "1",
                                  "probesize": "32",      # Min probe size for instant start
                                  "analyzeduration": "0",
                                  "fflags": "nobuffer",
                                  "flags": "low_delay",
                                  "thread_queue_size": "2" # Drastically reduce buffering
                              })
                              
                              transceiver = pc.addTransceiver(player.video)
                              # Force usage of our patched Hardware H264
                              capabilities = RTCRtpSender.getCapabilities("video")
                              prefs = [c for c in capabilities.codecs if c.mimeType == "video/H264"]
                              if prefs: transceiver.setCodecPreferences(prefs)

                              dc = pc.createDataChannel("input")
                              await handle_input(dc, pc)

                              offer = await pc.createOffer()
                              await pc.setLocalDescription(offer)
                              await ws.send(json.dumps({"type": pc.localDescription.type, "sdp": pc.localDescription.sdp}))
                          except Exception as e:
                              print(f"Error: {e}")
                      else:
                          try:
                              data = json.loads(msg)
                              if data.get("type") == "answer":
                                  await pc.setRemoteDescription(RTCSessionDescription(sdp=data["sdp"], type=data["type"]))
                          except: pass
                      await asyncio.sleep(0.01)

          if __name__ == "__main__":
              asyncio.run(run())
          EOF

      - name: Start Host
        run: python host.py
