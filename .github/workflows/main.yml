name: Native-Speed WebRTC

on: 
  workflow_dispatch:

jobs:
  native-stream:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native Tools (GStreamer)
        run: |
          brew install gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-plugins-ugly gst-libav pygobject3 pkg-config

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Wrappers
        run: pip install websockets pynput pycairo PyGObject

      - name: Create Native Pipeline Script
        run: |
          cat << 'EOF' > host.py
          import sys
          import json
          import asyncio
          import websockets
          import ssl
          import gi
          
          gi.require_version('Gst', '1.0')
          gi.require_version('GstWebRTC', '1.0')
          gi.require_version('GstSdp', '1.0')
          from gi.repository import Gst, GstWebRTC, GstSdp

          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Key, Controller as KeyboardController

          Gst.init(None)

          WS_URL = "wss://alvin3y1-forward.hf.space/macos"

          # --- THE NATIVE PIPELINE ---
          # 1. avfvideosrc: Reads directly from macOS Framebuffer (Kernel level)
          # 2. videoscale: Downscales in C (very fast)
          # 3. x264enc: Compresses video using C library (not Python)
          #    tune=zerolatency: SENDS DATA IMMEDIATELY, DOES NOT BUFFER
          PIPELINE_DESC = """
          webrtcbin name=sendrecv bundle-policy=max-bundle stun-server=stun://stun.l.google.com:19302
          avfvideosrc capture-cursor=true capture-mouse-clicks=true
           ! video/x-raw,framerate=30/1
           ! videoscale ! video/x-raw,width=1280,height=720
           ! videoconvert
           ! x264enc tune=zerolatency speed-preset=ultrafast bitrate=2000 key-int-max=30
           ! rtph264pay config-interval=-1 aggregate-mode=zero-latency
           ! application/x-rtp,media=video,encoding-name=H264,payload=96
           ! sendrecv.
          """

          mouse = MouseController()
          keyboard = KeyboardController()
          
          # Simplified Input Map
          KEY_MAP = {
              'space': Key.space, 'Return': Key.enter, 'BackSpace': Key.backspace,
              'Shift_L': Key.shift, 'Control_L': Key.ctrl_l, 'cmd': Key.cmd
          }

          class WebRTCClient:
              def __init__(self):
                  self.conn = None
                  self.pipe = Gst.parse_launch(PIPELINE_DESC)
                  self.webrtc = self.pipe.get_by_name('sendrecv')
                  self.ws = None
                  self.loop = asyncio.new_event_loop()

                  self.webrtc.connect('on-negotiation-needed', self.on_negotiation_needed)
                  self.webrtc.connect('on-ice-candidate', self.on_ice_candidate)

              def on_negotiation_needed(self, element):
                  promise = Gst.Promise.new_with_change_func(self.on_offer_created, element, None)
                  element.emit('create-offer', None, promise)

              def on_offer_created(self, promise, element, _):
                  reply = promise.get_reply()
                  offer = reply.get_value('offer')
                  promise = Gst.Promise.new()
                  element.emit('set-local-description', offer, promise)
                  
                  msg = {'type': 'offer', 'sdp': offer.sdp.as_text()}
                  asyncio.run_coroutine_threadsafe(self.ws.send(json.dumps(msg)), self.loop)

              def on_ice_candidate(self, element, mlineindex, candidate):
                  pass # Simplified for single-stream

              async def listen(self):
                  async with websockets.connect(WS_URL, ssl=ssl._create_unverified_context()) as ws:
                      self.ws = ws
                      print("Connected. Waiting for start...")
                      
                      while True:
                          msg = await ws.recv()
                          if msg == "start":
                              print("Starting Native Stream...")
                              self.pipe.set_state(Gst.State.PLAYING)
                          else:
                              try:
                                  data = json.loads(msg)
                                  t = data.get('type')
                                  
                                  if t == 'answer':
                                      res, sdpmsg = GstSdp.SDPMessage.new()
                                      GstSdp.sdp_message_parse_buffer(bytes(data['sdp'], 'utf-8'), sdpmsg)
                                      answer = GstWebRTC.WebRTCSessionDescription.new(GstWebRTC.WebRTCSDPType.ANSWER, sdpmsg)
                                      promise = Gst.Promise.new()
                                      self.webrtc.emit('set-remote-description', answer, promise)
                                  
                                  # --- INPUT HANDLING ---
                                  elif t == 'mousemove':
                                      pass # Add scaling logic if needed
                                  elif t == 'mousedown':
                                      mouse.press(Button.left)
                                  elif t == 'mouseup':
                                      mouse.release(Button.left)
                                  elif t == 'keydown':
                                      k = data['key']
                                      if k in KEY_MAP: keyboard.press(KEY_MAP[k])
                                      else: keyboard.press(k)
                                  elif t == 'keyup':
                                      k = data['key']
                                      if k in KEY_MAP: keyboard.release(KEY_MAP[k])
                                      else: keyboard.release(k)
                              except Exception as e:
                                  print(e)

          if __name__ == "__main__":
              c = WebRTCClient()
              c.loop.run_until_complete(c.listen())
          EOF

      - name: Run
        run: python host.py
