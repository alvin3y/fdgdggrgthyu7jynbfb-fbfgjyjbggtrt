name: Real-Time macOS Screen Stream

on: 
  workflow_dispatch:

jobs:
  stream-screen:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Open App (So the screen isn't empty)
        run: open -a Calculator

      - name: Start 30fps Screen Stream
        run: |
          # We use index "1" here as it's common for the virtual display on macos-latest
          # If it fails, try changing "1" to "0" in the -i argument below.
          
          ffmpeg -f avfoundation -capture_cursor 1 -i "1" \
            -vf "scale=1280:-1" -r 30 \
            -c:v libx264 -preset ultrafast -tune zerolatency \
            -pix_fmt yuv420p -b:v 2500k \
            -f flv "rtmp://iad05.contribute.live-video.net/app/live_1448220741_99LXQ4TGollmTzBeQLQmSEf7UCby3B"
