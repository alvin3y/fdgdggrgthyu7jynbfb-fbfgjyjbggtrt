name: Native WebRTC Stream (Auto-Res)

on: 
  workflow_dispatch:

jobs:
  native-stream:
    runs-on: macos-latest
    
    env:
      PKG_CONFIG_PATH: "/opt/homebrew/lib/pkgconfig"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          brew install ffmpeg pkg-config opus libvpx
          brew install displayplacer
          brew install swift
          # Grant permissions helper (attempt)
          tccutil reset ScreenCapture || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: |
          pip install --upgrade pip
          pip install aiortc aiohttp websockets pynput numpy pyobjc-framework-Quartz
          pip install av --no-binary av

      - name: Create Native Host Script
        run: |
          cat << 'EOF' > host.py
          import asyncio
          import json
          import ssl
          import websockets
          import subprocess
          import re
          import platform
          from aiortc import RTCPeerConnection, RTCSessionDescription, VideoStreamTrack, RTCIceServer, RTCConfiguration
          from aiortc.contrib.media import MediaPlayer
          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Key, Controller as KeyboardController
          import Quartz

          WS_URL = "wss://alvin3y1-forward.hf.space/macos"
          
          # TURN servers for traversing NATs
          ICE_SERVERS = [
              RTCIceServer(
                  urls=["turns:turn.cloudflare.com:443?transport=tcp", "turn:turn.cloudflare.com:3478?transport=udp"],
                  username="g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6",
                  credential="aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d"
              )
          ]

          mouse = MouseController()
          keyboard = KeyboardController()
          
          def get_screen_dimensions():
              main_id = Quartz.CGMainDisplayID()
              return Quartz.CGDisplayPixelsWide(main_id), Quartz.CGDisplayPixelsHigh(main_id)

          def match_resolution(target_w, target_h):
              """
              Parses displayplacer output to find the resolution closest to the client's request.
              This ensures 'perfect fit' within the capabilities of the host GPU/VM.
              """
              try:
                  # Get main display ID
                  out = subprocess.check_output(['displayplacer', 'list']).decode('utf-8')
                  id_match = re.search(r'Persistent screen id: ([^ \n]+)', out)
                  if not id_match: return
                  screen_id = id_match.group(1)
                  
                  # Parse available resolutions
                  resolutions = []
                  for line in out.split('\n'):
                      if 'Resolution:' in line:
                          parts = line.split(':')[1].strip().split('x')
                          if len(parts) >= 2:
                              w = int(parts[0])
                              h_clean = parts[1].split('@')[0].split(' ')[0] # Handle 1920x1080@60Hz
                              h = int(h_clean)
                              resolutions.append((w, h))
                  
                  if not resolutions: return

                  # Find closest resolution (Euclidean distance)
                  best_res = min(resolutions, key=lambda r: (r[0] - target_w)**2 + (r[1] - target_h)**2)
                  
                  print(f"Client requested: {target_w}x{target_h}. Switching host to closest match: {best_res[0]}x{best_res[1]}")
                  
                  # Execute switch
                  subprocess.run(['displayplacer', f"id:{screen_id}", f"res:{best_res[0]}x{best_res[1]}"], check=True)
              except Exception as e:
                  print(f"Failed to resize screen: {e}")

          KEY_MAP = {
              'space': Key.space, 'Return': Key.enter, 'BackSpace': Key.backspace,
              'Tab': Key.tab, 'Escape': Key.esc,
              'Control_L': Key.ctrl_l, 'Control_R': Key.ctrl_r,
              'Shift_L': Key.shift, 'Shift_R': Key.shift_r,
              'Alt_L': Key.alt, 'Alt_R': Key.alt_r,
              'Super_L': Key.cmd, 'cmd': Key.cmd,
              'Up': Key.up, 'Down': Key.down, 'Left': Key.left, 'Right': Key.right,
              'Home': Key.home, 'End': Key.end, 'Delete': Key.delete
          }

          async def run():
              ssl_context = ssl.create_default_context()
              ssl_context.check_hostname = False
              ssl_context.verify_mode = ssl.CERT_NONE
              
              print(f"Connecting to Signaling Server: {WS_URL}")
              
              async with websockets.connect(WS_URL, ssl=ssl_context) as ws:
                  print("WebSocket Connected. Waiting for 'start' signal...")
                  
                  pc = None
                  
                  while True:
                      message = await ws.recv()
                      
                      if message == "start":
                          print("Received START signal. Initializing PeerConnection...")
                          
                          pc = RTCPeerConnection(RTCConfiguration(iceServers=ICE_SERVERS))
                          
                          # 1. Screen Capture via AVFoundation
                          # Index "1" is usually the Screen on macOS Actions runners (Index "0" is often missing camera)
                          # We do NOT specify video_size in options to allow ffmpeg to auto-detect current res
                          try:
                              player = MediaPlayer("1", format="avfoundation", options={
                                  "framerate": "30",
                                  "pixel_format": "uyvy422",
                                  "capture_cursor": "1",
                                  "capture_mouse_clicks": "1",
                                  "probesize": "50M",
                                  "analyzeduration": "100M"
                              })
                              pc.addTrack(player.video)
                          except Exception as e:
                              print(f"SCREEN CAPTURE FAILED: {e}")
                              # Fallback try index 0
                              try:
                                  player = MediaPlayer("0", format="avfoundation", options={"framerate": "30", "pixel_format": "uyvy422"})
                                  pc.addTrack(player.video)
                              except:
                                  print("FATAL: Could not capture screen.")
                                  return

                          # 2. Data Channel for Input & Resizing
                          dc = pc.createDataChannel("input")
                          
                          @dc.on("open")
                          def on_open():
                              print("DataChannel Open")

                          @dc.on("message")
                          def on_input(msg):
                              try:
                                  data = json.loads(msg)
                                  t = data.get('type')
                                  
                                  # Get current resolution for coordinate mapping
                                  sw, sh = get_screen_dimensions()

                                  if t == 'resize':
                                      # Update Host Resolution to fit Client
                                      match_resolution(data['width'], data['height'])

                                  elif t == 'mousemove':
                                      x, y = int(data['x'] * sw), int(data['y'] * sh)
                                      mouse.position = (x, y)
                                  
                                  elif t == 'mousedown':
                                      btn = Button.left
                                      if data['button'] == 2: btn = Button.right
                                      elif data['button'] == 1: btn = Button.middle
                                      mouse.press(btn)
                                      
                                  elif t == 'mouseup':
                                      btn = Button.left
                                      if data['button'] == 2: btn = Button.right
                                      elif data['button'] == 1: btn = Button.middle
                                      mouse.release(btn)
                                      
                                  elif t == 'wheel':
                                      mouse.scroll(-data.get('deltaX', 0)*0.1, -data.get('deltaY', 0)*0.1)
                                      
                                  elif t == 'keydown':
                                      k = data['key']
                                      if k in KEY_MAP: keyboard.press(KEY_MAP[k])
                                      elif len(k) == 1: keyboard.press(k)
                                      
                                  elif t == 'keyup':
                                      k = data['key']
                                      if k in KEY_MAP: keyboard.release(KEY_MAP[k])
                                      elif len(k) == 1: keyboard.release(k)
                                      
                              except Exception as e:
                                  print(f"Input Error: {e}")

                          # 3. Create Offer
                          await pc.setLocalDescription(await pc.createOffer())
                          await ws.send(json.dumps({
                              "type": pc.localDescription.type, 
                              "sdp": pc.localDescription.sdp
                          }))
                          print("Offer sent.")

                      else:
                          # Handle Answer
                          try:
                              data = json.loads(message)
                              if data.get("type") == "answer" and pc:
                                  await pc.setRemoteDescription(RTCSessionDescription(
                                      sdp=data["sdp"], type=data["type"]
                                  ))
                                  print("Remote description set.")
                          except:
                              pass
                              
                      await asyncio.sleep(0.01)

          if __name__ == "__main__":
              asyncio.run(run())
          EOF

      - name: Start Host
        run: python host.py
