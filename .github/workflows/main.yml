name: High-Speed WebRTC Remote

on: 
  workflow_dispatch:

jobs:
  webrtc-stream:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          brew install ffmpeg pkg-config opus libvpx
          # We keep cliclick as a backup/utility if needed, though pynput is primary
          brew install cliclick 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: |
          pip install aiortc aiohttp websockets pynput av numpy

      - name: Create WebRTC Host Script
        run: |
          cat << 'EOF' > host.py
          import asyncio
          import json
          import ssl
          import websockets
          import logging
          from aiortc import RTCPeerConnection, RTCSessionDescription, VideoStreamTrack, RTCIceServer, RTCConfiguration
          from aiortc.contrib.media import MediaPlayer
          from pynput.mouse import Button, Controller as MouseController
          from pynput.keyboard import Key, Controller as KeyboardController

          # --- CONFIGURATION ---
          WS_URL = "wss://alvin3y1-forward.hf.space/macos"
          
          # Hardwired credentials from your provided HTML
          ICE_SERVERS = [
              RTCIceServer(
                  urls=["turns:turn.cloudflare.com:443?transport=tcp", "turn:turn.cloudflare.com:3478?transport=udp"],
                  username="g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6",
                  credential="aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d"
              )
          ]

          mouse = MouseController()
          keyboard = KeyboardController()

          # Get Screen Resolution for coordinate mapping
          import Quartz
          main_display_id = Quartz.CGMainDisplayID()
          screen_width = Quartz.CGDisplayPixelsWide(main_display_id)
          screen_height = Quartz.CGDisplayPixelsHigh(main_display_id)
          
          print(f"Server Screen Resolution: {screen_width}x{screen_height}")

          # --- INPUT MAPPING ---
          # Map X11/HTML keys to pynput Keys
          KEY_MAP = {
              'space': Key.space,
              'Return': Key.enter,
              'BackSpace': Key.backspace,
              'Tab': Key.tab,
              'Escape': Key.esc,
              'Control_L': Key.ctrl_l,
              'Control_R': Key.ctrl_r,
              'Shift_L': Key.shift,
              'Shift_R': Key.shift_r,
              'Alt_L': Key.alt,
              'Alt_R': Key.alt_r,
              'Super_L': Key.cmd,
              'cmd': Key.cmd,
              'Up': Key.up,
              'Down': Key.down,
              'Left': Key.left,
              'Right': Key.right,
              'Home': Key.home,
              'End': Key.end,
              'Page_Up': Key.page_up,
              'Page_Down': Key.page_down,
              'Delete': Key.delete,
              'Insert': Key.insert,
              'F1': Key.f1, 'F2': Key.f2, 'F3': Key.f3, 'F4': Key.f4,
              'F5': Key.f5, 'F6': Key.f6, 'F7': Key.f7, 'F8': Key.f8, 
              'F9': Key.f9, 'F10': Key.f10, 'F11': Key.f11, 'F12': Key.f12
          }

          async def handle_input(channel):
              @channel.on("message")
              def on_message(message):
                  try:
                      data = json.loads(message)
                      t = data.get('type')

                      if t == 'mousemove':
                          # Map 0.0-1.0 to screen coordinates
                          x = int(data['x'] * screen_width)
                          y = int(data['y'] * screen_height)
                          mouse.position = (x, y)
                      
                      elif t == 'mousedown':
                          btn = Button.left
                          if data['button'] == 1: btn = Button.middle
                          elif data['button'] == 2: btn = Button.right
                          mouse.press(btn)

                      elif t == 'mouseup':
                          btn = Button.left
                          if data['button'] == 1: btn = Button.middle
                          elif data['button'] == 2: btn = Button.right
                          mouse.release(btn)
                      
                      elif t == 'wheel':
                          # pynput scroll is (x, y) steps
                          dx = data.get('deltaX', 0)
                          dy = data.get('deltaY', 0)
                          # Invert and scale simple scroll
                          mouse.scroll(-dx * 0.1, -dy * 0.1)

                      elif t == 'keydown':
                          k = data['key']
                          if k in KEY_MAP:
                              keyboard.press(KEY_MAP[k])
                          elif len(k) == 1:
                              keyboard.press(k)
                      
                      elif t == 'keyup':
                          k = data['key']
                          if k in KEY_MAP:
                              keyboard.release(KEY_MAP[k])
                          elif len(k) == 1:
                              keyboard.release(k)
                              
                      elif t == 'resize':
                          # Client requested specific resolution, 
                          # but we are streaming the physical screen. 
                          # We ignore this for hardware capture usually.
                          pass

                  except Exception as e:
                      print(f"Input Error: {e}")

          async def run():
              print(f"Connecting to signaling server: {WS_URL}")
              
              # Disable SSL verification for simple self-signed handling if needed, 
              # though hf.space usually has valid certs.
              ssl_context = ssl.create_default_context()
              ssl_context.check_hostname = False
              ssl_context.verify_mode = ssl.CERT_NONE
              
              async with websockets.connect(WS_URL, ssl=ssl_context) as ws:
                  print("Connected to WebSocket. Waiting for 'start' command...")
                  
                  pc = None
                  
                  while True:
                      msg = await ws.recv()
                      # The signaling server might send simple strings or JSON
                      print(f"Received: {msg[:50]}...")
                      
                      if msg == "start":
                          print("Start command received! Initiating WebRTC...")
                          
                          config = RTCConfiguration(iceServers=ICE_SERVERS)
                          pc = RTCPeerConnection(config)
                          
                          # 1. Add Video Track (Screen Capture)
                          # format='avfoundation' uses macOS screen capture
                          # "0" is usually the first screen
                          # pixel_format uyvy422 is standard for mac avfoundation
                          player = MediaPlayer("0", format="avfoundation", options={
                              "framerate": "30",
                              "video_size": f"{screen_width}x{screen_height}", 
                              "pixel_format": "uyvy422",
                              "capture_cursor": "1",
                              "capture_mouse_clicks": "1"
                          })
                          
                          pc.addTrack(player.video)
                          
                          # 2. Setup Data Channel for Controls
                          # Note: We create it so the 'onopen' fires on client side
                          dc = pc.createDataChannel("input")
                          await handle_input(dc)

                          @pc.on("iceconnectionstatechange")
                          async def on_ice_state_change():
                              print(f"ICE State: {pc.iceConnectionState}")

                          # 3. Create Offer
                          offer = await pc.createOffer()
                          await pc.setLocalDescription(offer)
                          
                          # 4. Send Offer
                          payload = {
                              "type": pc.localDescription.type,
                              "sdp": pc.localDescription.sdp
                          }
                          await ws.send(json.dumps(payload))
                          print("Offer sent.")

                      else:
                          # Handle Answer or Candidates
                          try:
                              data = json.loads(msg)
                              if data.get("type") == "answer":
                                  print("Received Answer. Setting Remote Description...")
                                  desc = RTCSessionDescription(sdp=data["sdp"], type=data["type"])
                                  await pc.setRemoteDescription(desc)
                              elif data.get("candidate"):
                                  # Simple implementations might handle candidates via SDP updates
                                  # or specific candidate messages. 
                                  # For now, we rely on the Offer/Answer SDP containing candidates
                                  pass
                          except json.JSONDecodeError:
                              pass
                      
                      # Keep loop alive
                      await asyncio.sleep(0.1)

          if __name__ == "__main__":
              asyncio.run(run())
          EOF

      - name: Start Safari (Visual Target)
        run: |
          open -a Safari "https://www.google.com"
          sleep 3
          # Resize window to fill screen reasonably
          osascript -e 'tell application "Safari" to set bounds of front window to {0, 0, 1280, 800}'

      - name: Run WebRTC Stream
        run: python host.py
