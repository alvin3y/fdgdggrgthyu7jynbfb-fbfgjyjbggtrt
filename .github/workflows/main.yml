name: Native VNC Stream (noVNC)

on: 
  workflow_dispatch:

jobs:
  vnc-stream:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Python (Fixes the "externally managed environment" error)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 2. Install Dependencies
      - name: Install Tools
        run: |
          # Install websockify in the safe python environment
          pip install websockify
          
          # Install Cloudflare Tunnel
          brew install cloudflared

      # 3. Download noVNC Web Client
      # This provides the HTML/JS viewer so you don't just see a white page
      - name: Setup noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          cd noVNC
          git checkout v1.4.0
          ln -s vnc.html index.html
          cd ..

      # 4. Enable Native macOS Screen Sharing
      - name: Enable macOS VNC Server
        run: |
          echo "Enabling Screen Sharing..."
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw password \
            -restart -agent -privs -all

      # 5. Start websockify
      # Bridges VNC (5900) to WebSocket (6080) and serves the noVNC folder
      - name: Start Websockify
        run: |
          # Use 'python -m websockify' to ensure we use the installed module
          python -m websockify --web=./noVNC 6080 localhost:5900 &
          echo "Websockify running on port 6080"

      # 6. Expose to Internet via Cloudflare Tunnel
      - name: Start Tunnel & Stream
        run: |
          echo "Starting Cloudflare Tunnel..."
          cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &
          
          # Wait for the URL to be generated
          sleep 10
          TUNNEL_URL=$(grep -o 'https://.*\.trycloudflare.com' tunnel.log | head -n 1)
          
          echo "--------------------------------------------------------"
          echo "🔥 DESKTOP LIVE AT: $TUNNEL_URL/index.html?password=password&autoconnect=true"
          echo "--------------------------------------------------------"
          
          # Keep the job alive
          while true; do sleep 60; done
