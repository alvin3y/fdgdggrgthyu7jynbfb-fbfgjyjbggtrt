name: Native macOS VNC Stream

on: 
  workflow_dispatch:

jobs:
  vnc-stream:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fix for "externally managed environment" error
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install websockify
          brew install cloudflared

      - name: Setup noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          cd noVNC
          git checkout v1.4.0
          ln -s vnc.html index.html
          cd ..

      # --- THE AUTOMATED FIX ---
      - name: Enable VNC & System Settings
        run: |
          # 1. Set System Password (Crucial for Auth)
          sudo dscl . -passwd /Users/runner password

          # 2. Disable Screen Saver/Lock
          defaults write com.apple.screensaver idleTime 0
          sudo defaults write /Library/Preferences/com.apple.screensaver loginWindowIdleTime 0
          defaults write com.apple.screensaver askForPassword -int 0

          # 3. Enable Native VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -allowAccessFor -allUsers \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw password \
            -restart -agent -console
          
          echo "VNC Enabled."

      - name: Start Websockify & Tunnel
        run: |
          # Run websockify in background
          python -m websockify --web=./noVNC 6080 localhost:5900 &
          
          # Run Cloudflare Tunnel
          cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &
          
          # Wait for URL
          sleep 10
          TUNNEL_URL=$(grep -o 'https://.*\.trycloudflare.com' tunnel.log | head -n 1)
          
          echo "=========================================================="
          echo "🔴 ACCESS YOUR MAC HERE: $TUNNEL_URL/index.html?password=password&autoconnect=true"
          echo "=========================================================="
          
          # Keep alive
          while true; do sleep 60; done
