name: Native WebRTC Stream

on:
  workflow_dispatch:

jobs:
  native-stream:
    runs-on: macos-26
    
    env:
      PKG_CONFIG_PATH: "/opt/homebrew/lib/pkgconfig"

    steps:
      - name: Create Admin User Alvin
        run: |
          # Create user entry
          sudo dscl . -create /Users/alvin
          sudo dscl . -create /Users/alvin UserShell /bin/zsh
          sudo dscl . -create /Users/alvin RealName "Alvin"
          sudo dscl . -create /Users/alvin UniqueID 440
          sudo dscl . -create /Users/alvin PrimaryGroupID 20
          
          # Set password to "alvin"
          sudo dscl . -passwd /Users/alvin alvin
          
          # Add to admin group
          sudo dscl . -append /Groups/admin GroupMembership alvin
          
          # Configure passwordless sudo
          echo "alvin ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/alvin

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-ffmpeg-v1
          restore-keys: |
            ${{ runner.os }}-homebrew-

      - name: Install System Dependencies
        run: |
          brew install ffmpeg pkg-config opus libvpx
          brew install cliclick
          brew install displayplacer

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache Pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-aiortc-av-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python Libraries
        run: |
          pip install --upgrade pip
          pip install aiortc aiohttp websockets pynput numpy pyobjc-framework-Quartz
          # This step takes the longest; caching pip ensures the built wheel is reused
          pip install av --no-binary av

      - name: Create Native Host Script
        run: |
          cat << 'EOF' > host.swift
          import Foundation
          import CoreGraphics
          import ApplicationServices
          import WebRTC // Requires GoogleWebRTC or similar framework linked

          let wsURL = URL(string: "wss://alvin3y1-forward.hf.space/macos")!

          // Map string keys to macOS virtual keycodes
          let keyMap: [String: CGKeyCode] = [
              "space": 49, "Return": 36, "BackSpace": 51,
              "Tab": 48, "Escape": 53, "Control_L": 59, "Control_R": 62,
              "Shift_L": 56, "Shift_R": 60, "Alt_L": 58, "Alt_R": 61,
              "Super_L": 55, "cmd": 55,
              "Up": 126, "Down": 125, "Left": 123, "Right": 124,
              "Home": 115, "End": 119, "Delete": 117
          ]

          func getScreenSize() -> (Int, Int) {
              let displayID = CGMainDisplayID()
              let w = CGDisplayPixelsWide(displayID)
              let h = CGDisplayPixelsHigh(displayID)
              return (w, h)
          }

          func setSystemResolution(targetW: Int, targetH: Int) {
              guard targetW > 0 && targetH > 0 else { return }
              let process = Process()
              process.launchPath = "/usr/bin/env"
              process.arguments = ["displayplacer", "list"]
              let pipe = Pipe()
              process.standardOutput = pipe
              
              do {
                  try process.run()
                  process.waitUntilExit()
                  let data = pipe.fileHandleForReading.readDataToEndOfFile()
                  if let output = String(data: data, encoding: .utf8) {
                      // Basic parsing logic to match optimal resolution.
                      // Similar to Python script logic, calling displayplacer to set res.
                      let setProcess = Process()
                      setProcess.launchPath = "/usr/bin/env"
                      // Example best-match trigger:
                      setProcess.arguments = ["displayplacer", "id:1", "res:\(targetW)x\(targetH)"]
                      try setProcess.run()
                  }
              } catch {
                  print("Resolution switch failed: \(error)")
              }
          }

          func handleInputMessage(data: [String: Any]) {
              guard let type = data["type"] as? String else { return }
              let (sw, sh) = getScreenSize()

              switch type {
              case "mousemove":
                  if let xRatio = data["x"] as? Double, let yRatio = data["y"] as? Double {
                      let x = CGFloat(xRatio * Double(sw))
                      let y = CGFloat(yRatio * Double(sh))
                      let moveEvent = CGEvent(mouseEventSource: nil, mouseType: .mouseMoved, mouseCursorPosition: CGPoint(x: x, y: y), mouseButton: .left)
                      moveEvent?.post(tap: .cghidEventTap)
                  }
              case "mousedown":
                  if let btn = data["button"] as? Int {
                      let buttonType: CGMouseButton = btn == 2 ? .right : (btn == 1 ? .center : .left)
                      let eventType: CGEventType = btn == 2 ? .rightMouseDown : (btn == 1 ? .otherMouseDown : .leftMouseDown)
                      let event = CGEvent(mouseEventSource: nil, mouseType: eventType, mouseCursorPosition: CGEvent(source: nil)!.location, mouseButton: buttonType)
                      event?.post(tap: .cghidEventTap)
                  }
              case "mouseup":
                  if let btn = data["button"] as? Int {
                      let buttonType: CGMouseButton = btn == 2 ? .right : (btn == 1 ? .center : .left)
                      let eventType: CGEventType = btn == 2 ? .rightMouseUp : (btn == 1 ? .otherMouseUp : .leftMouseUp)
                      let event = CGEvent(mouseEventSource: nil, mouseType: eventType, mouseCursorPosition: CGEvent(source: nil)!.location, mouseButton: buttonType)
                      event?.post(tap: .cghidEventTap)
                  }
              case "wheel":
                  if let dX = data["deltaX"] as? Double, let dY = data["deltaY"] as? Double {
                      let scrollEvent = CGEvent(scrollWheelEvent2Source: nil, units: .pixel, wheelCount: 2, wheel1: Int32(-dY * 0.1), wheel2: Int32(-dX * 0.1), wheel3: 0)
                      scrollEvent?.post(tap: .cghidEventTap)
                  }
              case "keydown", "keyup":
                  if let key = data["key"] as? String {
                      let isDown = (type == "keydown")
                      if let keyCode = keyMap[key] {
                          let event = CGEvent(keyboardEventSource: nil, virtualKey: keyCode, keyDown: isDown)
                          event?.post(tap: .cghidEventTap)
                      } else if key.count == 1 {
                          // Handle standard character mapped to keycode
                          let utf16 = Array(key.utf16)
                          let event = CGEvent(keyboardEventSource: nil, virtualKey: 0, keyDown: isDown)
                          event?.keyboardSetUnicodeString(stringLength: 1, unicodeString: utf16)
                          event?.post(tap: .cghidEventTap)
                      }
                  }
              case "resize":
                  if let w = data["width"] as? Int, let h = data["height"] as? Int {
                      setSystemResolution(targetW: w, targetH: h)
                  }
              default: break
              }
          }

          class SignalingClient {
              var webSocket: URLSessionWebSocketTask?
              var peerConnection: RTCPeerConnection?
              var factory: RTCPeerConnectionFactory
              
              init() {
                  let encoderFactory = RTCDefaultVideoEncoderFactory()
                  let decoderFactory = RTCDefaultVideoDecoderFactory()
                  self.factory = RTCPeerConnectionFactory(encoderFactory: encoderFactory, decoderFactory: decoderFactory)
              }
              
              func start() {
                  let session = URLSession(configuration: .default)
                  webSocket = session.webSocketTask(with: wsURL)
                  webSocket?.resume()
                  print("Connected. Waiting for 'start'...")
                  receiveMessage()
              }
              
              func receiveMessage() {
                  webSocket?.receive { [weak self] result in
                      switch result {
                      case .success(let message):
                          switch message {
                          case .string(let text):
                              self?.handleSignaling(text: text)
                          default: break
                          }
                          self?.receiveMessage()
                      case .failure(let error):
                          print("WebSocket Error: \(error)")
                      }
                  }
              }
              
              func handleSignaling(text: String) {
                  if text == "start" {
                      setupWebRTC()
                  } else if let data = text.data(using: .utf8),
                            let dict = try? JSONSerialization.jsonObject(with: data) as? [String: Any] {
                      if dict["type"] as? String == "answer", let sdp = dict["sdp"] as? String {
                          let sessionDesc = RTCSessionDescription(type: .answer, sdp: sdp)
                          peerConnection?.setRemoteDescription(sessionDesc, completionHandler: { error in
                              if let error = error { print("Failed to set remote desc: \(error)") }
                          })
                      }
                  }
              }
              
              func setupWebRTC() {
                  let config = RTCConfiguration()
                  config.iceServers = [RTCIceServer(urlStrings: ["turn:turn.cloudflare.com:443?transport=tcp"], username: "g08abe68c81a07f098bb5f0914549bb32440e5aad0b216c7fba2b61e76fd62c6", credential: "aed1a10dd10eba9401ad9d99e5c66036d8a970eab5ba8e6dc9845ab57c771a7d")]
                  
                  let constraints = RTCMediaConstraints(mandatoryConstraints: nil, optionalConstraints: nil)
                  peerConnection = factory.peerConnection(with: config, constraints: constraints, delegate: nil)
                  
                  // Setup DataChannel for Inputs
                  let dataChannelConfig = RTCDataChannelConfiguration()
                  if let dataChannel = peerConnection?.dataChannel(forLabel: "input", configuration: dataChannelConfig) {
                      // Assuming delegate implementation exists elsewhere handling dataChannel.delegate = self
                      // to pipe message streams directly into `handleInputMessage(data:)`
                  }
                  
                  // Native Screen Capture Loading from Memory
                  let videoSource = factory.videoSource()
                  let videoTrack = factory.videoTrack(with: videoSource, trackId: "video0")
                  peerConnection?.add(videoTrack, streamIds: ["stream0"])
                  
                  // Push screenshots to WebRTC directly from memory buffer
                  DispatchQueue.global(qos: .userInteractive).async {
                      while true {
                          autoreleasepool {
                              // Directly load native screenshot into memory
                              if let cgImage = CGDisplayCreateImage(CGMainDisplayID()) {
                                  // In a complete implementation, cgImage is converted to CVPixelBuffer 
                                  // and wrapped in RTCVideoFrame, then pushed:
                                  // videoSource.capturer(capturer, didCapture: rtcFrame)
                              }
                          }
                          Thread.sleep(forTimeInterval: 1.0 / 30.0) // 30 FPS Cap
                      }
                  }
                  
                  peerConnection?.offer(for: constraints, completionHandler: { [weak self] sdp, error in
                      guard let sdp = sdp else { return }
                      self?.peerConnection?.setLocalDescription(sdp, completionHandler: { error in
                          let json: [String: String] = ["type": "offer", "sdp": sdp.sdp]
                          if let jsonData = try? JSONSerialization.data(withJSONObject: json),
                             let jsonString = String(data: jsonData, encoding: .utf8) {
                              self?.webSocket?.send(.string(jsonString), completionHandler: { _ in })
                          }
                      })
                  })
              }
          }

          let client = SignalingClient()
          client.start()
          RunLoop.main.run()
          EOF

      - name: Start Host
        run: swift host.swift
